apiVersion: v1
kind: Pod
metadata:
  name: gpu-train
  namespace: tessel
  labels:
    app: gpu-train
spec:
  restartPolicy: Never

  # Force pod to run on the GPU node where /u01/tessel-old/phatltt exists
  nodeName: kubernetes-xqbj-nodegroup-gpu-worker-tnc98-mmb97

  containers:
    - name: trainer
      image: pytorch/pytorch:2.6.0-cuda12.4-cudnn9-devel
      imagePullPolicy: IfNotPresent

      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e

          echo "=== System info ==="
          uname -a
          df -h
          df -h /dev/shm || true

          echo "=== NVIDIA SMI ==="
          nvidia-smi

          echo "=== Install OS packages ==="
          apt update
          apt install -y \
            time \
            procps \
            curl \
            wget \
            unzip \
            git \
            vim \
            htop \
            tmux \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libglib2.0-0 \
            libgl1 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libgomp1 \
            ffmpeg

          echo "=== Upgrade pip safely ==="
          python -m pip install -U "pip<26" "setuptools<82" wheel

          echo "=== Current PyTorch stack from image ==="
          python - <<'PY'
          import sys
          import torch
          import torchvision
          print("python:", sys.version)
          print("torch:", torch.__version__)
          print("torchvision:", torchvision.__version__)
          print("torch cuda:", torch.version.cuda)
          print("cuda available:", torch.cuda.is_available())
          if torch.cuda.is_available():
              print("gpu:", torch.cuda.get_device_name(0))
          PY

          echo "=== Fix NumPy/OpenCV ABI compatibility ==="
          python -m pip uninstall -y numpy opencv-python opencv-python-headless || true

          python -m pip install --no-cache-dir \
            "numpy==1.26.4" \
            "opencv-python-headless==4.11.0.86"

          echo "=== Install project requirements without replacing torch stack ==="
          cd /workspace

          # Remove packages that are already handled/pinned by the base image or by the ABI fix above.
          grep -v -E '^(torch|torchvision|torchaudio|numpy|opencv-python|opencv-python-headless)([<>= ].*)?$' \
            requirements.txt > /tmp/requirements-clean.txt

          cat /tmp/requirements-clean.txt

          python -m pip install --no-cache-dir -r /tmp/requirements-clean.txt

          echo "=== Install local project if pyproject/setup.py exists ==="
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install -e .
          fi

          echo "=== Final verify Python / CUDA ==="
          python - <<'PY'
          import sys
          import torch
          import torchvision
          import numpy as np
          import cv2

          print("python:", sys.version)
          print("torch:", torch.__version__)
          print("torchvision:", torchvision.__version__)
          print("torch cuda:", torch.version.cuda)
          print("numpy:", np.__version__)
          print("cv2:", cv2.__version__)
          print("cuda_available:", torch.cuda.is_available())
          print("cuda_device_count:", torch.cuda.device_count())

          if torch.cuda.is_available():
              print("gpu:", torch.cuda.get_device_name(0))
          PY

          echo "=== Workspace ==="
          cd /workspace
          pwd
          ls -lah

          echo "Pod is ready. Exec into this pod and run training from /workspace."
          sleep infinity

      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,utility

        - name: PYTHONDONTWRITEBYTECODE
          value: "1"

        - name: PYTHONPATH
          value: /workspace

        - name: HF_HOME
          value: /workspace/.cache/huggingface

        - name: TORCH_HOME
          value: /workspace/.cache/torch

        - name: PIP_CACHE_DIR
          value: /workspace/.cache/pip

      resources:
        requests:
          nvidia.com/mig-3g.20gb: 2
          cpu: "8"
          memory: 24Gi
        limits:
          nvidia.com/mig-3g.20gb: 2
          cpu: "12"
          memory: 40Gi

      volumeMounts:
        - name: train-workdir
          mountPath: /workspace

        - name: dshm
          mountPath: /dev/shm

  volumes:
    - name: train-workdir
      hostPath:
        path: /u01/tessel-old/phatltt
        type: Directory

    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
